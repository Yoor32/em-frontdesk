<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Passport — Front Desk</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d0d0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="EM Front Desk">
<!--
  EM PASSPORT FRONT-DESK DASHBOARD  v3.0
  Recycled patterns from the FitKid Gymnastic staff PWA (live-search dropdown,
  student "ficha" dashboard with quick-actions, toast, PWA), re-skinned to EM
  black & gold and wired to the EM Front Desk API v2.
  Host on GitHub Pages → embed in a password-protected Duda page.
  Config: API_URL, LINK_URL, PLAN_PRICE, PAY_PRESETS, CRM_LINKS below.
-->
<style>
  :root{
    --gold:#D4AF37; --gold-dim:#a8862a; --bg:#0d0d0f; --panel:#17171b; --panel2:#1f1f25; --panel3:#26262c;
    --text:#f2ede3; --muted:#9a938a; --hint:#6f6a63; --err:#e05656; --ok:#5fbf7a; --line:#2b2b31;
    --r-lg:16px; --r:12px; --r-sm:9px; --pill:999px;
    --sh:0 6px 20px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
  body{background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  #app,#login{max-width:760px;margin:0 auto;padding:18px 14px 70px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px}
  label{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:10px 0 6px}
  input,select{width:100%;padding:12px 13px;border-radius:var(--r-sm);border:1px solid #33333b;background:var(--panel2);color:var(--text);font-size:1rem;outline:none;font-family:inherit}
  input:focus,select:focus{border-color:var(--gold)}
  button{font-family:inherit;cursor:pointer}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:12px;padding:13px;border:0;border-radius:var(--r-sm);background:var(--gold);color:#151515;font-weight:700;font-size:.95rem;letter-spacing:.04em;text-transform:uppercase}
  .btn:hover{background:var(--gold-dim)} .btn:disabled{opacity:.5;cursor:wait}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid #33333b;text-transform:none;font-weight:600;letter-spacing:0}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold);background:var(--panel2)}
  .btn.ok{background:rgba(95,191,122,.14);color:var(--ok);border:1px solid rgba(95,191,122,.4)}

  /* hero */
  .hero{border-radius:var(--r-lg);padding:16px 18px;margin-bottom:16px;background:linear-gradient(120deg,#1a1408 0%,#241c0c 60%,#12100a 100%);border:1px solid #33280f}
  .hrow{display:flex;align-items:center;gap:12px}
  .hlogo{width:40px;height:40px;border-radius:11px;background:var(--gold);color:#151515;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem}
  .htit{font-weight:700;font-size:1.15rem;color:var(--gold);letter-spacing:.02em}
  .hsub{font-size:.75rem;color:var(--muted)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
  .stat{background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.18);border-radius:11px;padding:9px 11px}
  .stat .v{font-size:1.15rem;font-weight:700;color:var(--gold)}
  .stat .l{font-size:.7rem;color:var(--muted);margin-top:1px}

  /* search + dropdown */
  .search{position:relative;margin-bottom:14px}
  .search input{padding-left:38px}
  .search::before{content:"🔍";position:absolute;left:13px;top:12px;opacity:.5}
  .drop{position:absolute;left:0;right:0;top:50px;background:var(--panel);border:1px solid var(--panel3);border-radius:var(--r-sm);box-shadow:var(--sh);max-height:320px;overflow:auto;z-index:40;display:none}
  .drop.on{display:block}
  .ditem{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--line)}
  .ditem:hover{background:var(--panel2)} .ditem:last-child{border-bottom:0}
  .avatar{width:32px;height:32px;border-radius:50%;background:rgba(212,175,55,.15);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;flex:0 0 auto}

  /* tabs */
  .tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;-webkit-overflow-scrolling:touch}
  .tab{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:9px 12px;border-radius:var(--pill);background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:.78rem;white-space:nowrap}
  .tab.on{background:var(--gold);color:#151515;font-weight:700;border-color:var(--gold)}
  .tab .cnt{background:rgba(0,0,0,.18);border-radius:10px;padding:0 6px;font-size:.7rem}
  .tab:not(.on) .cnt{background:var(--panel3);color:var(--hint)}
  .secline{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:2px 2px 11px}

  /* action grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .act{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;transition:border-color .15s,transform .12s}
  .act:hover{border-color:var(--gold);transform:translateY(-2px)}
  .act .ic{width:38px;height:38px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:9px}
  .act .t{font-weight:600;font-size:.92rem}
  .act .d{color:var(--muted);font-size:.77rem;margin-top:3px}
  .act .star{position:absolute;top:11px;right:11px;font-size:.6rem;color:var(--gold);background:rgba(212,175,55,.12);padding:2px 7px;border-radius:var(--pill)}
  .assist{margin-top:14px;padding:12px;border-radius:var(--r-sm);background:rgba(212,175,55,.06);border:1px solid rgba(212,175,55,.22);text-align:center;color:var(--gold);font-size:.85rem;cursor:pointer}

  /* modal / popup */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:20px 12px;overflow:auto}
  .overlay.on{display:flex}
  .modal{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--gold);border-radius:var(--r-lg);box-shadow:var(--sh);overflow:hidden;animation:rise .18s ease}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .mhead{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .mbody{padding:16px 18px}
  .close{margin:0;width:auto;background:none;border:0;color:var(--muted);font-size:1.4rem;line-height:1;padding:2px 6px}
  .close:hover{color:var(--gold)}
  .statusbadge{font-size:.7rem;padding:4px 10px;border-radius:var(--pill);background:var(--panel2);color:var(--muted)}
  .statusbadge.member{background:var(--gold);color:#151515;font-weight:700}
  .miniStat{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
  .ms{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px}
  .ms .l{font-size:.68rem;color:var(--muted)}
  .ms .v{font-size:.95rem;font-weight:600;margin-top:2px}
  .stampbar{height:9px;border-radius:6px;background:var(--panel3);margin:10px 0 5px;overflow:hidden}
  .stampfill{height:100%;background:var(--gold);border-radius:6px;transition:width .5s}
  .qagrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .qa{display:flex;align-items:center;gap:8px;padding:11px 12px;border-radius:var(--r-sm);background:var(--panel2);border:1px solid #33333b;color:var(--text);font-size:.86rem;font-weight:600}
  .qa:hover{border-color:var(--gold);color:var(--gold)}
  .qa.wide{grid-column:1/-1}
  .subform{margin-top:12px;padding:12px;border-radius:var(--r-sm);background:var(--panel2);border:1px dashed #3a3a42}
  .reclist{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);padding:4px 12px}
  .reclineup{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .reclineup:last-child{border-bottom:0}

  .msg{margin-top:11px;padding:11px 13px;border-radius:var(--r-sm);font-size:.9rem;display:none}
  .msg.err{display:block;background:rgba(224,86,86,.12);border:1px solid var(--err);color:var(--err)}
  .msg.ok{display:block;background:rgba(95,191,122,.1);border:1px solid var(--ok);color:var(--ok)}
  .back{margin:0;width:auto;background:none;border:0;color:var(--muted);font-size:.82rem;padding:6px 0}
  .hidden{display:none}
  .paybtn{display:block;margin-top:9px;padding:12px;border-radius:var(--r-sm);background:var(--panel2);border:1px solid #33333b;color:var(--text);text-decoration:none;text-align:center;font-size:.9rem}
  .paybtn:hover{border-color:var(--gold);color:var(--gold)}
  .checkrow{display:flex;align-items:center;gap:10px;margin-top:10px}
  .checkrow input[type=checkbox]{width:20px;height:20px;accent-color:var(--gold)}
  .checkrow label{margin:0;font-size:.88rem;text-transform:none;letter-spacing:0;color:var(--text)}
  .logout{background:none;border:0;color:var(--muted);font-size:.75rem;margin:16px auto 0;text-decoration:underline;width:auto;display:block;padding:6px}
  .modtitle{font-size:1.05rem;font-weight:600}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div style="text-align:center;margin:8px 0 18px"><div class="htit">EM Passport</div><div class="hsub">Front Desk · Queen &amp; Andrew · 20 Mod</div></div>
  <div class="card">
    <label for="pin">Staff PIN</label>
    <input id="pin" type="password" inputmode="numeric" maxlength="8" placeholder="••••••" autocomplete="off">
    <button class="btn" id="loginBtn" onclick="doLogin()">Enter</button>
    <div id="loginMsg" class="msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="hero">
    <div class="hrow"><div class="hlogo">EM</div><div style="flex:1"><div class="htit">Front Desk</div><div class="hsub">EM Passport · quick actions</div></div></div>
    <div class="stats">
      <div class="stat"><div class="v" id="stToday">–</div><div class="l">bookings today</div></div>
      <div class="stat"><div class="v" id="stChk">–</div><div class="l">checked in</div></div>
      <div class="stat"><div class="v" id="stStaff">–</div><div class="l">on shift</div></div>
    </div>
  </div>

  <div class="search"><input id="live" placeholder="Search student by name…" autocomplete="off"><div id="drop" class="drop"></div></div>

  <div class="tabs">
    <div class="tab on" data-t="classes" onclick="showTab('classes')">🕺 Check-in &amp; Classes <span class="cnt">4</span></div>
    <div class="tab" data-t="students" onclick="showTab('students')">👤 Students &amp; Passport <span class="cnt">4</span></div>
    <div class="tab" data-t="payments" onclick="showTab('payments')">💳 Payments <span class="cnt">4</span></div>
    <div class="tab" data-t="reports" onclick="showTab('reports')">📊 Reports <span class="cnt">4</span></div>
  </div>

  <div id="tabBody"></div>
  <div class="assist" onclick="alert('Coming next phase: the AI assistant answers questions and handles bookings here.')">💬 Free mode · ask the assistant <span style="opacity:.6">(coming soon)</span></div>
  <button class="logout" onclick="doLogout()">Lock (clear PIN)</button>
</div>

<!-- STUDENT POPUP -->
<div id="overlay" class="overlay" onclick="if(event.target===this)closeStudent()">
  <div class="modal"><div id="modalContent"></div></div>
</div>

<script>
/* ═══════════ CONFIG ═══════════ */
const API_URL = "https://yoor32.app.n8n.cloud/webhook/front-desk";
const CRM_LINKS = {
  studio:      "https://www.notion.so/3936190090d18134a9f7d0b3f48c974d",
  students:    "https://www.notion.so/948bd872740a4c6c8892f8db110c6ba3",
  payments:    "https://www.notion.so/7f7e6f6157dc4a57b913997cc38b8d43",
  memberships: "https://www.notion.so/93496f9b675f4f5b82bc30db0c39abcc",
  winback:     "https://www.notion.so/948bd872740a4c6c8892f8db110c6ba3"
};
const LINK_URL = "https://yoor32.app.n8n.cloud/webhook/stripe-link"; // Stripe checkout-link generator (n8n)
const LINK_SECRET = "em-frontdesk-2026"; // must match the secret in the n8n "Build Session Body" node
const REPORT_URL = "https://yoor32.app.n8n.cloud/webhook/em-report"; // EM Reports API (weekly/monthly)
// Stripe recurring Price IDs. ACTIVE = TEST. AT GO-LIVE: comment the two TEST lines, uncomment the two LIVE lines, re-upload to GitHub.
const PLAN_PRICE = {
  // TEST (active now):
  "EM Passport — $24.99/mo": "price_1TqjZsHDfjs5Y7AfZlXwsmO5",
  "EM Family — $249.99/mo (Passport + $225 team fee)": "price_1TqjZsHDfjs5Y7Afd2DONxAy"
  // LIVE (swap in at cutover):
  // "EM Passport — $24.99/mo": "price_1TrTWNHDfjs5Y7AfAvzgjkYU",
  // "EM Family — $249.99/mo (Passport + $225 team fee)": "price_1TrTWNHDfjs5Y7AfV1U5IS1n"
};
// One-off checkout presets for the "Stripe pay links" panel
const PAY_PRESETS = [
  { label:"Drop-in class — $35", item:"Drop-in class", amount:35 },
  { label:"Level Assessment — $20", item:"Level Assessment", amount:20 },
  { label:"Workshop — $60", item:"Workshop", amount:60 },
  { label:"Workshop (member) — $30", item:"Workshop (member)", amount:30 },
  { label:"Course 8wk — $169.98", item:"Course (8-week)", amount:169.98 },
  { label:"Course 8wk (member) — $84.99", item:"Course (8-week, member)", amount:84.99 },
  { label:"Course split payment — $84.99", item:"Course (8-week, split 1 of 2)", amount:84.99 }
];
const PLANS = ["EM Passport — $24.99/mo","EM Family — $249.99/mo (Passport + $225 team fee)"];
const PAY_METHODS = ["Stripe","Cash","E-transfer","PayPal","Other"];
/* Ladder v3 (15 tiers) — locked July 18, 2026. Must match Front Desk API nodes (Stamp Calc, Build Profile, Validate Reward) and the Notion Rewards Log "Reward" select EXACTLY. */
const LADDER = [[10,"EM Badge"],[20,"Personalized Pen"],[30,"Personalized Keychain"],[40,"Personalized Water Bottle"],[50,"Personalized Tumbler"],[60,"Personalized T-Shirt"],[70,"EM Tote Bag"],[80,"EM Cap"],[90,"EM Hoodie"],[100,"Free Workshop Ticket"],[110,"Free Private Lesson"],[120,"Coffee Date with Queen & Andrew"],[130,"Ambassador Gift Box"],[140,"EM Jacket"],[150,"Festival Ticket"]];
const STUDIO_ADDRESS = "Alchemy Studio — 20 Maud Street, 2nd Floor, Unit 205, Toronto, ON M5V 2M5";
const WAIVER_TEXT = "I acknowledge that dance and physical movement involve inherent risks of injury. I voluntarily choose to participate in EM Passport classes, workshops, and private lessons. I release Queen & Andrew / EM Passport from liability for injuries arising from the ordinary risks of participation. I consent to being photographed or recorded for promotional and social media purposes unless I opt out in writing. I confirm that all information I have provided is accurate to the best of my knowledge.";
/* ═══════════════════════════════ */

let PIN = sessionStorage.getItem("em_pin") || "";
let CUR = null; // current student in popup
let UPCOMING = []; // current student's upcoming bookings

async function api(p){
  const res = await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pin:PIN,...p})});
  let d={}; try{ d=await res.json(); }catch(e){ d={ok:false,error:"Bad response"}; }
  if(res.status===401){ doLogout(); throw new Error("Invalid PIN — locked."); }
  if(!res.ok && !d.error) d.error="Server error "+res.status;
  return d;
}
function esc(s){ return String(s??"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function ini(n){ return String(n||"?").split(" ").filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase(); }
function pct(stamps){ const next=LADDER.find(l=>l[0]>stamps),prev=[...LADDER].reverse().find(l=>l[0]<=stamps); const lo=prev?prev[0]:0,hi=next?next[0]:(prev?prev[0]:10); return Math.min(100,Math.round(((stamps-lo)/Math.max(1,hi-lo))*100)); }
/* Generate a Stripe checkout link via the n8n link generator, then open it. opts:{item,amount?,priceId?,email?} */
async function genLink(opts){
  try{
    const res=await fetch(LINK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({secret:LINK_SECRET,...opts})});
    let d={}; try{ d=await res.json(); }catch(e){}
    if(res.ok && d && d.ok && d.url){ window.open(d.url,"_blank","noopener"); return {ok:true,url:d.url}; }
    return {ok:false,error:(d&&d.error)||("Server "+res.status)};
  }catch(e){ return {ok:false,error:e.message}; }
}

/* ── login ── */
async function doLogin(){
  const btn=document.getElementById("loginBtn"); btn.disabled=true;
  PIN=document.getElementById("pin").value.trim();
  try{ const r=await api({action:"today"}); if(r.ok!==undefined){ sessionStorage.setItem("em_pin",PIN); enterApp(r); } }
  catch(e){ const m=document.getElementById("loginMsg"); m.className="msg err"; m.textContent=e.message; }
  btn.disabled=false;
}
function enterApp(todayRes){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  showTab("classes"); loadStats(todayRes);
  bindLiveSearch();
}
function doLogout(){ PIN=""; CUR=null; sessionStorage.removeItem("em_pin"); document.getElementById("app").classList.add("hidden"); document.getElementById("login").classList.remove("hidden"); document.getElementById("pin").value=""; }

async function loadStats(todayRes){
  try{
    const r = todayRes && todayRes.count!==undefined ? todayRes : await api({action:"today"});
    document.getElementById("stToday").textContent = r.count ?? 0;
    document.getElementById("stChk").textContent = "✓";
    document.getElementById("stStaff").textContent = "1";
  }catch(e){}
}

/* ── live search → popup ── */
let _t;
function bindLiveSearch(){
  const box=document.getElementById("live"), drop=document.getElementById("drop");
  box.oninput=()=>{ clearTimeout(_t); const q=box.value.trim(); if(q.length<2){ drop.className="drop"; drop.innerHTML=""; return; } _t=setTimeout(()=>runSearch(q),250); };
  document.addEventListener("click",e=>{ if(!box.contains(e.target)&&!drop.contains(e.target)) drop.className="drop"; });
}
async function runSearch(q){
  const drop=document.getElementById("drop");
  try{
    const r=await api({action:"search",query:q});
    if(!r.ok||!r.results.length){ drop.className="drop on"; drop.innerHTML='<div class="ditem" style="cursor:default;color:var(--muted)">No matches</div>'; return; }
    drop.innerHTML=r.results.map(s=>'<div class="ditem" onclick="openStudent(\''+(s.passport||s.studentId)+'\')"><div class="avatar">'+ini(s.name)+'</div><div style="flex:1"><div style="font-weight:600;font-size:.9rem">'+esc(s.name)+'</div><div style="color:var(--muted);font-size:.76rem">'+esc(s.passport||"no passport")+(s.member?' · ✦ member':'')+' · '+s.stamps+' stamps</div></div><span style="color:var(--muted)">›</span></div>').join("");
    drop.className="drop on";
  }catch(e){ drop.className="drop"; }
}

/* ═══════════ STUDENT POPUP DASHBOARD ═══════════ */
async function openStudent(idOrEmail){
  document.getElementById("drop").className="drop";
  document.getElementById("live").value="";
  const ov=document.getElementById("overlay"); ov.classList.add("on");
  document.getElementById("modalContent").innerHTML='<div class="mbody" style="text-align:center;color:var(--muted);padding:40px">Loading…</div>';
  try{ const r=await api({action:"student",passport:idOrEmail}); if(!r.ok){ modalError(r.error||"Not found"); return; } CUR=r; renderStudent(r); }
  catch(e){ modalError(e.message); }
}
function closeStudent(){ document.getElementById("overlay").classList.remove("on"); CUR=null; }
function modalError(msg){ document.getElementById("modalContent").innerHTML='<div class="mhead"><div class="modtitle">Student</div><button class="close" onclick="closeStudent()">×</button></div><div class="mbody"><div class="msg err" style="display:block">'+esc(msg)+'</div></div>'; }

function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso); return d.toLocaleDateString([], {month:"short",day:"numeric"})+" "+d.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}); }
function payStatusColor(s){ if(/attention|failed/i.test(s)) return "var(--err)"; if(/no payments/i.test(s)) return "var(--muted)"; return "var(--ok)"; }
function renderStudent(r){
  const p=r.member?pct(r.stamps):0;
  const qr = r.passport ? '<img src="https://api.qrserver.com/v1/create-qr-code/?size=72x72&data='+encodeURIComponent(r.passport)+'" style="width:72px;height:72px;border-radius:8px;background:#fff;padding:3px">' : '';
  // upcoming classes
  const up = (r.upcoming||[]);
  UPCOMING = up;
  const upHtml = up.length
    ? up.map((c,i)=>'<div class="reclineup" '+(c.id?'style="cursor:pointer" onclick="qaBookingDetail(\''+c.id+'\')"':'')+'><span style="color:var(--gold);font-weight:600;font-size:.8rem;white-space:nowrap">'+fmtDate(c.time)+'</span><span style="flex:1;font-size:.85rem">'+esc(c.pkg||c.booking)+(c.covered?' <span class="statusbadge member" style="font-size:.56rem">EM ✦</span>':'')+'</span><span style="color:var(--muted);font-size:.72rem">'+esc(c.status||"")+(c.id?' ›':'')+'</span></div>').join("")
    : '<div style="color:var(--muted);font-size:.83rem;padding:6px 0">No upcoming classes booked.</div>';
  // payments
  const pays=(r.payments||[]);
  const payHtml = pays.length

async function loadCatalog(){

/* ── smart class picker: parse free-text schedules, rank "on now" first ── */
function schedHits(x){
  const now=new Date(); const dow=now.getDay(); const mins=now.getHours()*60+now.getMinutes();
  const BEFORE=30, AFTER=75; // "on now" = 30 min before start → 75 min after start
  if(x.kind==="event"){
    if(!x.date) return {today:false,now:false,diff:9999};
    const d=new Date(x.date); if(isNaN(d)) return {today:false,now:false,diff:9999};
    const sameDay=d.toDateString()===now.toDateString();
    const dm=d.getHours()*60+d.getMinutes();
    return {today:sameDay, now:sameDay&&mins>=dm-BEFORE&&mins<=dm+AFTER, diff:sameDay?Math.abs(mins-dm):9999};
  }
  const s=String(x.schedule||"").toLowerCase();
  const dayMap={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};
  const days=[]; s.replace(/\b(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tues|tue|wed|thurs|thur|thu|fri|sat)\b/g,function(m,d){ const k=dayMap[d.slice(0,3)]; if(days.indexOf(k)===-1) days.push(k); return m; });
  const times=[]; const re=/((?:\d{1,2}(?::\d{2})?)(?:\s*\/\s*\d{1,2}(?::\d{2})?)*)\s*(am|pm)/g; let m;
  while((m=re.exec(s))){
    const ap=m[2];
    for(const part of m[1].split("/")){
      const t=part.trim().split(":"); let h=(+t[0])%12; if(ap==="pm") h+=12;
      times.push(h*60+(+(t[1]||0)));
    }
  }
  const today=days.indexOf(dow)!==-1;
  const diff=today&&times.length?Math.min.apply(null,times.map(t=>Math.abs(mins-t))):9999;
  return {today, now:today&&times.some(t=>mins>=t-BEFORE&&mins<=t+AFTER), diff};
}
function catalogSorted(items){
  items.forEach((x,i)=>{ const h=schedHits(x); x._now=h.now; x._today=h.today; x._diff=h.diff; x._i=i; });
  items.sort((a,b)=>(((b._now?2:0)+(b._today?1:0))-((a._now?2:0)+(a._today?1:0)))||(a._diff-b._diff)||(a._i-b._i));
  return items;
}
async function checkinCatalog(){ return catalogSorted(await loadCatalog()); }
function catalogOptions(items){
  return items.map((x,i)=>'<option value="'+i+'">'+esc(x.name)+' ('+esc(x.type||x.kind)+')'+(x._now?' · ▶ now':(x._today?' · today':''))+'</option>').join("");
}
function preselectClass(sel,items){
  if(!sel) return;
  let i=items.findIndex(x=>x._now);

  sel.selectedIndex=i>=0?i:0;
}

function attSearchInput(){ clearTimeout(_at); const q=document.getElementById("atFind").value.trim(); const res=document.getElementById("atFindRes"); if(q.length<2){ if(res) res.innerHTML=""; return; } _at=setTimeout(()=>attSearch(q),250); }
async function attSearch(q){
  const res=document.getElementById("atFindRes"); if(!res||!ATT) return;
  try{
    const r=await api({action:"search",query:q});
    if(!r.ok||!r.results.length){ res.innerHTML='<div style="color:var(--muted);font-size:.8rem;padding:6px 0">No matches</div>'; return; }

function attAbsorb(s){
  const ex=ATT.students.find(x=>x.studentId===s.studentId);
  if(ex) ex.checkedInToday=true;
  else ATT.students.push({studentId:s.studentId,name:s.name||"",passport:s.passport||"",member:!!s.member,checkedInToday:true});

}
async function attWalkin(sid){

    atStatus(res.ok?"ok":"err", (res.ok?"✓ ":"")+(s.name?s.name+" — ":"")+(res.message||r.error||"Failed"));

async function attScanGo(code){
  atStatus("ok","Checking in "+code+"…");

    attAbsorb({studentId:r.studentId,name:r.studentName,member:r.member});

}
/* ── QR scanner (lazy-loaded html5-qrcode) ── */
let QR=null, QR_LIB=null;
function loadQrLib(){
  if(window.Html5Qrcode) return Promise.resolve();
  return QR_LIB || (QR_LIB=new Promise((res,rej)=>{
    const sc=document.createElement("script");
    sc.src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js";
    sc.onload=()=>res(); sc.onerror=()=>{ QR_LIB=null; rej(new Error("Could not load the scanner (offline?)")); };
    document.head.appendChild(sc);
  }));
}
async function startScan(onCode){
  try{ await loadQrLib(); }catch(e){ alert(e.message); return; }
  const wrap=document.createElement("div");
  wrap.id="qrOverlay";
  wrap.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px";
  wrap.innerHTML='<div style="color:var(--muted);font-size:.85rem;margin-bottom:12px">Point the camera at the passport QR</div><div id="qrView" style="width:min(92vw,420px);border-radius:12px;overflow:hidden"></div><button class="btn ghost" style="max-width:420px;margin-top:14px" onclick="stopScan()">Cancel</button>';
  document.body.appendChild(wrap);
  QR=new Html5Qrcode("qrView");
  try{
    await QR.start({facingMode:"environment"},{fps:10,qrbox:{width:220,height:220}},txt=>{
      const code=String(txt||"").trim(); stopScan(); if(code) onCode(code);
    },()=>{});
  }catch(e){
    stopScan();
    alert("Camera unavailable: "+((e&&e.message)||e)+"\n\nIf you are on the Duda /staff page, the embed iframe needs allow=\"camera\". Opening the dashboard directly (yoor32.github.io/em-frontdesk) also works.");
  }
}
function stopScan(){
  try{ if(QR){ const q=QR; QR=null; q.stop().then(()=>q.clear()).catch(()=>{}); } }catch(e){}
  const w=document.getElementById("qrOverlay"); if(w) w.remove();
}
function attApply(results){
  for(const res of (results||[])){
    const s=ATT.students.find(x=>x.studentId===res.studentId); if(s) s.checkedInToday=true;
    const row=document.getElementById(attRowId(res.studentId)); if(!row) continue;
    const st=row.querySelector(".att-st");
    if(st) st.innerHTML = res.ok ? '<span style="color:var(--ok);font-size:.8rem">✓ '+esc(res.message||"Checked in")+'</span>' : '<span style="color:var(--muted);font-size:.74rem">'+esc(res.message||"Skipped")+'</span>';
  }
}
async function attOne(sid){
  atStatus("ok","Checking in…");

async function attAll(){
  const ids=ATT.students.filter(s=>!s.checkedInToday).map(s=>s.studentId);

  atStatus("ok","Checking in "+ids.length+" students…");
  try{ const r=await api({action:"bulkcheckin",classId:ATT.classId,itemType:ATT.itemType,studentIds:ids});

    const okd=(r.results||[]).filter(x=>x.ok).length;
    atStatus(r.ok?"ok":"err", r.ok?("✓ "+okd+" checked in · "+((r.results||[]).length-okd)+" skipped"):(r.error||"Failed"));

    '<div class="subform" style="margin-top:10px"><label>Custom — item</label><input id="plItem" placeholder="e.g. Private lesson"><label>Amount (CAD)</label><input id="plAmt" type="number" inputmode="decimal" placeholder="75"><label>Customer email (optional)</label><input id="plEmail" type="email" placeholder="name@email.com"><button class="btn" onclick="payLinkCustom()">Generate one-off link</button></div>'+
    '<div class="modtitle" style="font-size:.82rem;margin:14px 0 4px">Membership (recurring)</div>'+
    PLANS.map(pl=>'<button class="paybtn" onclick="payLinkSub(this.dataset.plan)" data-plan="'+esc(pl)+'">'+esc(pl)+'</button>').join("")+
    '<div id="plMsg" class="msg" style="margin-top:10px;display:none"></div>'
  );
}
function plStatus(ok,txt){ const m=document.getElementById("plMsg"); if(!m)return; m.style.display="block"; m.className="msg "+(ok?"ok":"err"); m.textContent=txt; }
async function payLinkPreset(i){ const p=PAY_PRESETS[i]; plStatus(true,"Opening checkout link…"); const r=await genLink({item:p.item,amount:p.amount}); plStatus(r.ok, r.ok?"✓ Link opened in a new tab":("Error: "+r.error)); }
async function payLinkCustom(){ const item=document.getElementById("plItem").value||"EM payment"; const amount=Number(document.getElementById("plAmt").value); const email=document.getElementById("plEmail").value; if(!amount){ plStatus(false,"Enter an amount"); return; } plStatus(true,"Opening checkout link…"); const r=await genLink({item,amount,email}); plStatus(r.ok, r.ok?"✓ Link opened in a new tab":("Error: "+r.error)); }
async function payLinkSub(plan){ const priceId=PLAN_PRICE[plan]; if(!priceId){ plStatus(false,"No price configured for "+plan); return; } plStatus(true,"Opening subscription checkout…"); const r=await genLink({item:plan,priceId}); plStatus(r.ok, r.ok?"✓ Subscription link opened":("Error: "+r.error)); }

/* restore session */
if(PIN){ enterApp(); }
document.getElementById("pin") && document.getElementById("pin").addEventListener("keydown",e=>{ if(e.key==="Enter")doLogin(); });
</script>
<script>if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }</script>
</body>
